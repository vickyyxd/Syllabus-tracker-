<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vicky's Study Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #0a0a12;
  --surface: rgba(255,255,255,0.05);
  --surface2: rgba(255,255,255,0.09);
  --border: rgba(255,255,255,0.1);
  --text: #f0f0ff;
  --muted: #8888aa;
  --accent: #7c6cfc;
  --accent2: #fc6cab;
  --radius: 16px;
  --gap: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Space Grotesk', sans-serif;
  color: var(--text);
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  overflow-x: hidden;
}

/* ── Wallpaper Layer ── */
#wallpaper-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  transition: all 0.6s ease;
  background-size: cover;
  background-position: center;
}

.grad-1 { background: linear-gradient(135deg, #0a0a20 0%, #1a0a35 40%, #0a1a35 100%); }
.grad-2 { background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%); }
.grad-3 { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
.grad-4 { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); }
.grad-5 { background: linear-gradient(135deg, #200122, #6f0000); }
.grad-6 { background: linear-gradient(135deg, #004d40, #00251a); }
.grad-7 { background: radial-gradient(ellipse at top, #1a1054 0%, #0a0a0a 70%); }
.grad-8 { background: linear-gradient(180deg, #0d0221 0%, #090c3b 50%, #1a0533 100%); }

#wallpaper-overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(0px);
}

/* ── Layout ── */
#app {
  position: relative;
  z-index: 2;
  max-width: 1280px;
  margin: 0 auto;
  padding: 28px 24px 60px;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  flex-wrap: wrap;
  gap: 16px;
}

.logo-area h1 {
  font-size: 2rem;
  font-weight: 700;
  background: linear-gradient(90deg, #7c6cfc, #fc6cab, #fca06c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
}

.logo-area .subtitle {
  font-size: 0.85rem;
  color: var(--muted);
  margin-top: 2px;
  font-family: 'JetBrains Mono', monospace;
}

.header-right { display: flex; gap: 10px; align-items: center; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: all 0.2s ease;
}

.btn-primary {
  background: linear-gradient(135deg, #7c6cfc, #a855f7);
  color: #fff;
  box-shadow: 0 4px 20px rgba(124,108,252,0.35);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,108,252,0.5); }

.btn-ghost {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--surface2); }

.btn-danger { background: rgba(244,63,94,0.15); color: #f87171; border: 1px solid rgba(244,63,94,0.3); }
.btn-danger:hover { background: rgba(244,63,94,0.25); }

.btn-sm { padding: 6px 12px; font-size: 0.78rem; border-radius: 8px; }
.btn-icon { padding: 8px; border-radius: 8px; }

/* ── Stats Bar ── */
#stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 14px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
}

.stat-card.purple::before { background: linear-gradient(90deg, #7c6cfc, #a855f7); }
.stat-card.pink::before { background: linear-gradient(90deg, #fc6cab, #f43f5e); }
.stat-card.green::before { background: linear-gradient(90deg, #10b981, #059669); }
.stat-card.amber::before { background: linear-gradient(90deg, #f59e0b, #d97706); }

.stat-value {
  font-size: 2rem;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

/* ── Main Grid ── */
#main-grid {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: var(--gap);
  align-items: start;
}

@media (max-width: 900px) { #main-grid { grid-template-columns: 1fr; } }

/* ── Task Board ── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
}

.panel-title {
  font-size: 1rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── Category Filter Tabs ── */
#cat-tabs {
  display: flex;
  gap: 8px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
  flex-wrap: wrap;
}

.cat-tab {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  transition: all 0.2s;
  white-space: nowrap;
}
.cat-tab:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
.cat-tab.active { color: #fff; border-color: transparent; }

/* ── Task List ── */
#task-list { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; min-height: 200px; }

.task-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}

.task-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
}

.task-item:hover { background: rgba(255,255,255,0.07); transform: translateX(2px); }
.task-item.done { opacity: 0.55; }
.task-item.done .task-title { text-decoration: line-through; color: var(--muted); }

/* ── Checkbox ── */
.task-checkbox {
  width: 24px;
  height: 24px;
  min-width: 24px;
  border-radius: 7px;
  border: 2px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  transition: all 0.2s;
  margin-top: 2px;
  background: transparent;
}
.task-checkbox.checked {
  border-color: transparent;
  color: #fff;
}

.task-body { flex: 1; min-width: 0; }

.task-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}

.task-cat-badge {
  font-size: 0.68rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.task-time {
  font-size: 0.75rem;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

.task-title {
  font-size: 0.95rem;
  font-weight: 600;
  transition: all 0.2s;
}

.task-actions {
  display: flex;
  gap: 6px;
  opacity: 0;
  transition: opacity 0.2s;
  align-items: flex-start;
}
.task-item:hover .task-actions { opacity: 1; }

/* ── Sidebar ── */
#sidebar { display: flex; flex-direction: column; gap: var(--gap); }

/* ── Wallpaper Picker ── */
.wp-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 16px 20px;
}

.wp-option {
  aspect-ratio: 16/9;
  border-radius: 8px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
  overflow: hidden;
  position: relative;
}
.wp-option:hover { transform: scale(1.05); }
.wp-option.active { border-color: var(--accent); box-shadow: 0 0 12px rgba(124,108,252,0.5); }

.wp-label {
  font-size: 0.6rem;
  font-weight: 600;
  text-align: center;
  margin-top: 4px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.wp-custom-area {
  padding: 0 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.wp-custom-area input[type="text"] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px;
  color: var(--text);
  font-size: 0.8rem;
  font-family: inherit;
  outline: none;
}
.wp-custom-area input[type="text"]:focus { border-color: var(--accent); }

/* ── Progress Ring ── */
.progress-panel { padding: 20px; text-align: center; }
.ring-wrap { position: relative; display: inline-block; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.ring-pct { font-size: 1.8rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.ring-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.progress-cats { margin-top: 18px; display: flex; flex-direction: column; gap: 10px; }
.cat-progress-row { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
.cat-progress-name { width: 100px; color: var(--muted); font-size: 0.75rem; }
.cat-progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
.cat-progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.cat-progress-count { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); }

/* ── Date Nav ── */
.date-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}
.date-nav .date-label {
  font-size: 0.88rem;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
}
.date-nav button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 7px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem; transition: background 0.2s; }
.date-nav button:hover { background: rgba(255,255,255,0.12); }

/* ── Modal ── */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-backdrop.open { display: flex; }

.modal {
  background: #12121e;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  width: 100%;
  max-width: 480px;
  padding: 28px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.6);
  animation: modalIn 0.25s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: none; } }

.modal h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 22px; }

.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }

.form-input, .form-select {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  color: var(--text);
  font-size: 0.9rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus { border-color: var(--accent); }
.form-select option { background: #12121e; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.color-row { display: flex; align-items: center; gap: 10px; }
.color-preview { width: 40px; height: 40px; border-radius: 8px; border: 2px solid var(--border); flex-shrink: 0; }

.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 30px;
  right: 30px;
  z-index: 999;
  background: #1e1e2e;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 20px;
  font-size: 0.88rem;
  font-weight: 500;
  transform: translateY(20px);
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast.success { border-color: rgba(16,185,129,0.4); }
#toast.error { border-color: rgba(244,63,94,0.4); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 20px;
  color: var(--muted);
  text-align: center;
  gap: 12px;
}
.empty-state .icon { font-size: 2.5rem; }
.empty-state p { font-size: 0.9rem; }

.today-badge {
  font-size: 0.65rem;
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent);
  border: 1px solid rgba(124,108,252,0.3);
  padding: 2px 7px;
  border-radius: 20px;
  font-weight: 600;
}

/* Streak flame */
.streak { color: #f59e0b; }
</style>
</head>

<body>
<div id="wallpaper-layer" class="grad-1"></div>
<div id="wallpaper-overlay"></div>

<div id="app">

  <!-- Header -->
  <header>
    <div class="logo-area">
      <h1>⚡ StudySync</h1>
      <div class="subtitle" id="today-label">Loading...</div>
    </div>
    <div class="header-right">
      <button class="btn btn-ghost" onclick="openModal('add')">➕ Add Task</button>
    </div>
  </header>

  <!-- Stats -->
  <div id="stats-bar">
    <div class="stat-card purple">
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-label">Total Tasks</div>
    </div>
    <div class="stat-card pink">
      <div class="stat-value" id="stat-done">0</div>
      <div class="stat-label">Done Today</div>
    </div>
    <div class="stat-card green">
      <div class="stat-value" id="stat-pct">0%</div>
      <div class="stat-label">Completion</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-value streak" id="stat-streak">🔥 0</div>
      <div class="stat-label">Best Streak</div>
    </div>
  </div>

  <!-- Main -->
  <div id="main-grid">
    <!-- Task Board -->
    <div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">📋 Task Board</div>
          <span class="today-badge" id="date-badge">TODAY</span>
        </div>

        <!-- Date Nav -->
        <div class="date-nav">
          <button onclick="changeDate(-1)">◀ Prev</button>
          <div class="date-label" id="nav-date-label">—</div>
          <button onclick="changeDate(1)">Next ▶</button>
        </div>

        <!-- Category Filter -->
        <div id="cat-tabs">
          <button class="cat-tab active" data-cat="All" onclick="filterCat(this, 'All')" style="background:linear-gradient(135deg,#7c6cfc,#a855f7);border-color:transparent;color:#fff;">All</button>
          <button class="cat-tab" data-cat="Study" onclick="filterCat(this,'Study')">📚 Study</button>
          <button class="cat-tab" data-cat="Gym" onclick="filterCat(this,'Gym')">💪 Gym</button>
          <button class="cat-tab" data-cat="Art of Living" onclick="filterCat(this,'Art of Living')">🧘 Art of Living</button>
          <button class="cat-tab" data-cat="Coding" onclick="filterCat(this,'Coding')">💻 Coding</button>
          <button class="cat-tab" data-cat="IIT Madras" onclick="filterCat(this,'IIT Madras')">🎓 IIT Madras</button>
          <button class="cat-tab" data-cat="Other" onclick="filterCat(this,'Other')">📌 Other</button>
        </div>

        <div id="task-list">
          <div class="empty-state"><div class="icon">⌛</div><p>Loading tasks...</p></div>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">

      <!-- Progress -->
      <div class="panel">
        <div class="panel-header"><div class="panel-title">📊 Today's Progress</div></div>
        <div class="progress-panel">
          <div class="ring-wrap">
            <svg width="130" height="130" viewBox="0 0 130 130">
              <circle cx="65" cy="65" r="55" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10"/>
              <circle id="ring-fill" cx="65" cy="65" r="55" fill="none" stroke="url(#rg)" stroke-width="10"
                stroke-linecap="round" stroke-dasharray="345.6" stroke-dashoffset="345.6" style="transition:stroke-dashoffset 0.6s ease"/>
              <defs>
                <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#7c6cfc"/>
                  <stop offset="100%" stop-color="#fc6cab"/>
                </linearGradient>
              </defs>
            </svg>
            <div class="ring-center">
              <div class="ring-pct" id="ring-pct">0%</div>
              <div class="ring-label">Done</div>
            </div>
          </div>
          <div class="progress-cats" id="cat-progress-bars"></div>
        </div>
      </div>

      <!-- Wallpaper -->
      <div class="panel">
        <div class="panel-header"><div class="panel-title">🖼️ Background</div></div>
        <div class="wp-grid" id="wp-grid">
          <!-- filled by JS -->
        </div>
        <div class="wp-custom-area">
          <div class="form-label">Custom Image URL</div>
          <input type="text" id="custom-wp-url" placeholder="https://your-image-url.jpg" />
          <button class="btn btn-ghost btn-sm" onclick="applyCustomWallpaper()">Apply Custom</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-backdrop" id="task-modal">
  <div class="modal">
    <h2 id="modal-title">Add New Task</h2>

    <div class="form-group">
      <label class="form-label">Task Title</label>
      <input type="text" class="form-input" id="f-title" placeholder="e.g. Physics Chapter 3" />
    </div>

    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="f-category" onchange="autoCatColor()">
        <option value="Study">📚 Study</option>
        <option value="Gym">💪 Gym</option>
        <option value="Art of Living">🧘 Art of Living</option>
        <option value="Coding">💻 Coding</option>
        <option value="IIT Madras">🎓 IIT Madras</option>
        <option value="Other">📌 Other</option>
      </select>
    </div>

    <div class="form-row form-group">
      <div>
        <label class="form-label">Start Time</label>
        <input type="time" class="form-input" id="f-start" value="09:00" />
      </div>
      <div>
        <label class="form-label">End Time</label>
        <input type="time" class="form-input" id="f-end" value="10:00" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Color</label>
      <div class="color-row">
        <div class="color-preview" id="color-preview" style="background:#7c6cfc"></div>
        <input type="color" class="form-input" id="f-color" value="#7c6cfc" style="padding:4px;height:42px;cursor:pointer;" oninput="document.getElementById('color-preview').style.background=this.value" />
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ──
let allTasks = [];
let currentFilter = 'All';
let currentDate = new Date().toISOString().split('T')[0];
let todayStr = currentDate;
let editingId = null;

const CAT_COLORS = {
  'Study': '#6366f1',
  'Gym': '#f43f5e',
  'Art of Living': '#10b981',
  'Coding': '#f59e0b',
  'IIT Madras': '#8b5cf6',
  'Other': '#64748b'
};

const WALLPAPERS = [
  { id: 'gradient_1', label: 'Cosmos', cls: 'grad-1', preview: 'linear-gradient(135deg,#0a0a20,#1a0a35,#0a1a35)' },
  { id: 'gradient_2', label: 'Night', cls: 'grad-2', preview: 'linear-gradient(135deg,#0d1117,#161b22,#0d1117)' },
  { id: 'gradient_3', label: 'Nebula', cls: 'grad-3', preview: 'linear-gradient(135deg,#0f0c29,#302b63,#24243e)' },
  { id: 'gradient_4', label: 'Ocean', cls: 'grad-4', preview: 'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)' },
  { id: 'gradient_5', label: 'Ember', cls: 'grad-5', preview: 'linear-gradient(135deg,#200122,#6f0000)' },
  { id: 'gradient_6', label: 'Forest', cls: 'grad-6', preview: 'linear-gradient(135deg,#004d40,#00251a)' },
  { id: 'gradient_7', label: 'Aurora', cls: 'grad-7', preview: 'radial-gradient(ellipse at top,#1a1054,#0a0a0a 70%)' },
  { id: 'gradient_8', label: 'Midnight', cls: 'grad-8', preview: 'linear-gradient(180deg,#0d0221,#090c3b 50%,#1a0533)' },
];

// ── Init ──
async function init() {
  updateDateLabel();
  await loadTasks();
  await loadStats();
  await loadWallpaper();
  renderWallpaperPicker();
}

function updateDateLabel() {
  const d = new Date(currentDate + 'T00:00:00');
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  const label = d.toLocaleDateString('en-IN', opts);
  document.getElementById('today-label').textContent = currentDate === todayStr ? '📅 ' + label + ' — TODAY' : '📅 ' + label;
  document.getElementById('nav-date-label').textContent = label;
  document.getElementById('date-badge').textContent = currentDate === todayStr ? 'TODAY' : d.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' });
}

function changeDate(delta) {
  const d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  currentDate = d.toISOString().split('T')[0];
  updateDateLabel();
  renderTasks();
  updateProgress();
}

// ── API ──
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

async function loadTasks() {
  const data = await api('GET', '/api/tasks');
  allTasks = data.tasks || [];
  todayStr = data.today;
  renderTasks();
  updateProgress();
}

async function loadStats() {
  const data = await api('GET', '/api/stats');
  document.getElementById('stat-total').textContent = data.total;
  document.getElementById('stat-done').textContent = data.done_today;
  const pct = data.total ? Math.round(data.done_today / data.total * 100) : 0;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('stat-streak').textContent = '🔥 ' + data.streak;
}

async function loadWallpaper() {
  const data = await api('GET', '/api/wallpaper');
  if (data.custom) {
    applyWallpaperUrl(data.custom);
    document.getElementById('custom-wp-url').value = data.custom;
  } else {
    setGradient(data.wallpaper || 'gradient_1');
  }
}

// ── Render Tasks ──
function renderTasks() {
  const list = document.getElementById('task-list');
  let tasks = currentFilter === 'All' ? allTasks : allTasks.filter(t => t.category === currentFilter);
  tasks = [...tasks].sort((a, b) => a.start.localeCompare(b.start));

  if (!tasks.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No tasks${currentFilter !== 'All' ? ' in ' + currentFilter : ''}.<br>Click <strong>Add Task</strong> to create one.</p></div>`;
    return;
  }

  list.innerHTML = tasks.map(t => {
    const done = t.done_dates && t.done_dates.includes(currentDate);
    const color = t.color || '#7c6cfc';
    const emoji = catEmoji(t.category);
    return `
      <div class="task-item ${done ? 'done' : ''}" id="task-${t.id}" style="--t-color:${color}">
        <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${color};border-radius:3px 0 0 3px;"></div>
        <div class="task-checkbox ${done ? 'checked' : ''}" onclick="toggleTask(${t.id})"
          style="${done ? 'background:' + color + ';border-color:' + color : ''}">
          ${done ? '✓' : ''}
        </div>
        <div class="task-body">
          <div class="task-meta">
            <span class="task-cat-badge" style="background:${color}22;color:${color}">${emoji} ${t.category}</span>
            <span class="task-time">🕐 ${t.start} – ${t.end}</span>
          </div>
          <div class="task-title">${t.title}</div>
        </div>
        <div class="task-actions">
          <button class="btn btn-ghost btn-icon btn-sm" onclick="openModal('edit',${t.id})" title="Edit">✏️</button>
          <button class="btn btn-danger btn-icon btn-sm" onclick="deleteTask(${t.id})" title="Delete">🗑️</button>
        </div>
      </div>
    `;
  }).join('');
}

function catEmoji(cat) {
  const map = { 'Study': '📚', 'Gym': '💪', 'Art of Living': '🧘', 'Coding': '💻', 'IIT Madras': '🎓', 'Other': '📌' };
  return map[cat] || '📌';
}

function filterCat(el, cat) {
  currentFilter = cat;
  document.querySelectorAll('.cat-tab').forEach(t => {
    t.classList.remove('active');
    t.style.background = '';
    t.style.borderColor = '';
    t.style.color = '';
  });
  el.classList.add('active');
  el.style.background = 'linear-gradient(135deg,#7c6cfc,#a855f7)';
  el.style.borderColor = 'transparent';
  el.style.color = '#fff';
  renderTasks();
}

// ── Toggle ──
async function toggleTask(id) {
  const data = await api('POST', `/api/tasks/${id}/toggle`, { date: currentDate });
  const task = allTasks.find(t => t.id === id);
  if (task) task.done_dates = data.task.done_dates;
  renderTasks();
  updateProgress();
  await loadStats();
  toast(data.done ? '✅ Task marked done!' : '↩️ Task unmarked', data.done ? 'success' : '');
}

// ── Progress ──
function updateProgress() {
  const tasks = allTasks;
  const total = tasks.length;
  const done = tasks.filter(t => t.done_dates && t.done_dates.includes(currentDate)).length;
  const pct = total ? Math.round(done / total * 100) : 0;

  document.getElementById('ring-pct').textContent = pct + '%';
  const circumference = 2 * Math.PI * 55;
  const offset = circumference * (1 - pct / 100);
  document.getElementById('ring-fill').style.strokeDashoffset = offset;

  // category breakdown
  const cats = {};
  tasks.forEach(t => {
    if (!cats[t.category]) cats[t.category] = { total: 0, done: 0, color: t.color };
    cats[t.category].total++;
    if (t.done_dates && t.done_dates.includes(currentDate)) cats[t.category].done++;
  });

  document.getElementById('cat-progress-bars').innerHTML = Object.entries(cats).map(([cat, v]) => {
    const p = v.total ? Math.round(v.done / v.total * 100) : 0;
    return `<div class="cat-progress-row">
      <div class="cat-progress-name">${catEmoji(cat)} ${cat}</div>
      <div class="cat-progress-bar"><div class="cat-progress-fill" style="width:${p}%;background:${v.color}"></div></div>
      <div class="cat-progress-count">${v.done}/${v.total}</div>
    </div>`;
  }).join('');
}

// ── Modal ──
function openModal(mode, id) {
  editingId = null;
  const modal = document.getElementById('task-modal');
  document.getElementById('modal-title').textContent = mode === 'edit' ? '✏️ Edit Task' : '➕ New Task';

  if (mode === 'edit' && id) {
    const t = allTasks.find(x => x.id === id);
    if (!t) return;
    editingId = id;
    document.getElementById('f-title').value = t.title;
    document.getElementById('f-category').value = t.category;
    document.getElementById('f-start').value = t.start;
    document.getElementById('f-end').value = t.end;
    document.getElementById('f-color').value = t.color || '#7c6cfc';
    document.getElementById('color-preview').style.background = t.color || '#7c6cfc';
  } else {
    document.getElementById('f-title').value = '';
    document.getElementById('f-category').value = 'Study';
    document.getElementById('f-start').value = '09:00';
    document.getElementById('f-end').value = '10:00';
    document.getElementById('f-color').value = '#6366f1';
    document.getElementById('color-preview').style.background = '#6366f1';
  }

  modal.classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 100);
}

function closeModal() {
  document.getElementById('task-modal').classList.remove('open');
}

function autoCatColor() {
  const cat = document.getElementById('f-category').value;
  const color = CAT_COLORS[cat] || '#64748b';
  document.getElementById('f-color').value = color;
  document.getElementById('color-preview').style.background = color;
}

async function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('⚠️ Please enter a task title', 'error'); return; }

  const body = {
    title,
    category: document.getElementById('f-category').value,
    start: document.getElementById('f-start').value,
    end: document.getElementById('f-end').value,
    color: document.getElementById('f-color').value,
  };

  if (editingId) {
    const data = await api('PUT', `/api/tasks/${editingId}`, body);
    const idx = allTasks.findIndex(t => t.id === editingId);
    if (idx !== -1) allTasks[idx] = data.task;
    toast('✅ Task updated!', 'success');
  } else {
    const data = await api('POST', '/api/tasks', body);
    allTasks.push(data.task);
    toast('🎉 Task added!', 'success');
  }

  closeModal();
  renderTasks();
  updateProgress();
  await loadStats();
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  await api('DELETE', `/api/tasks/${id}`);
  allTasks = allTasks.filter(t => t.id !== id);
  renderTasks();
  updateProgress();
  await loadStats();
  toast('🗑️ Task deleted');
}

// ── Wallpaper ──
function renderWallpaperPicker() {
  document.getElementById('wp-grid').innerHTML = WALLPAPERS.map(w => `
    <div>
      <div class="wp-option ${w.cls}" id="wp-${w.id}" style="background:${w.preview}" onclick="setWallpaper('${w.id}','${w.cls}')"></div>
      <div class="wp-label">${w.label}</div>
    </div>
  `).join('');
}

let activeWpId = 'gradient_1';

function setGradient(wpId) {
  const wp = WALLPAPERS.find(w => w.id === wpId);
  if (!wp) return;
  const layer = document.getElementById('wallpaper-layer');
  layer.className = '';
  layer.classList.add(wp.cls);
  layer.style.backgroundImage = '';
  activeWpId = wpId;
  document.querySelectorAll('.wp-option').forEach(el => el.classList.remove('active'));
  const opt = document.getElementById('wp-' + wpId);
  if (opt) opt.classList.add('active');
}

function setWallpaper(wpId, cls) {
  setGradient(wpId);
  api('POST', '/api/wallpaper', { wallpaper: wpId, custom_wallpaper: null });
}

function applyWallpaperUrl(url) {
  const layer = document.getElementById('wallpaper-layer');
  layer.className = '';
  layer.style.backgroundImage = `url('${url}')`;
  document.querySelectorAll('.wp-option').forEach(el => el.classList.remove('active'));
  api('POST', '/api/wallpaper', { wallpaper: 'custom', custom_wallpaper: url });
}

function applyCustomWallpaper() {
  const url = document.getElementById('custom-wp-url').value.trim();
  if (!url) { toast('⚠️ Please enter an image URL', 'error'); return; }
  applyWallpaperUrl(url);
  toast('🖼️ Wallpaper applied!', 'success');
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('task-modal').classList.contains('open')) {
    if (document.activeElement.tagName !== 'BUTTON') saveTask();
  }
});

document.getElementById('task-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── Toast ──
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => { el.className = ''; }, 2800);
}

// ── Start ──
init();
</script>
